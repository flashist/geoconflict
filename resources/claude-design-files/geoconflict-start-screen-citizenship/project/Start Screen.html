  </span>
);
const ChatIcon = ({size=22}) => <img src="assets/icons/ChatIconWhite.svg" width={size} height={size} style={{filter:'brightness(10)',opacity:0.9}} />;

    height:44, background:'#111', display:'flex', alignItems:'center',

// ---- TAB SWITCHER ----
const TabSwitcher = ({active, onChange}) => (

    borderRadius:10, padding:3, gap:3, flexShrink:0
  }}>

      <button key={tab} onClick={() => onChange(tab)}
        style={{
          flex:1, padding:'7px 0', borderRadius:8, border:'none', cursor:'pointer',
          fontFamily:'Overpass,system-ui,sans-serif', fontWeight:700, fontSize:13,
          transition:'all 0.2s ease',

          color: active===tab ? 'white' : 'rgba(255,255,255,0.55)',
          boxShadow: active===tab ? '0 1px 4px rgba(0,0,0,0.4)' : 'none',

// ---- JOIN GAME CARD ----
const JoinGameCard = ({highlighted, onClick}) => {
  const [secs, setSecs] = useState(22);
  useEffect(() => {
    const t = setInterval(() => setSecs(s => s > 0 ? s-1 : 22), 1000);
    return () => clearInterval(t);
  }, []);
  return (
    <button onClick={onClick} style={{
      margin:'10px 12px 0', borderRadius:14, border:'none', cursor:'pointer',
      overflow:'hidden', position:'relative', height:130, flexShrink:0,
      background: highlighted
        ? 'linear-gradient(135deg,#16a34a,#15803d)'
        : 'linear-gradient(135deg,#2563eb,#1d4ed8)',
      transition:'all 0.3s ease', width:'calc(100% - 24px)',
      display:'flex', flexDirection:'column',
    }}>
      {/* Map background */}
      <img src="assets/images/RandomMap.webp" alt="map"
        style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',
          opacity:0.35, maskImage:'linear-gradient(to right, #000 30%, transparent 100%)',
          WebkitMaskImage:'linear-gradient(to right, #000 30%, transparent 100%)'}} />
      {/* Content */}
      <div style={{position:'relative',zIndex:1,display:'flex',flexDirection:'column',justifyContent:'space-between',height:'100%',padding:'12px 14px',color:'white',textAlign:'right'}}>
        <div>
          <div style={{fontSize:17,fontWeight:700,textShadow:'0 1px 3px rgba(0,0,0,0.5)',marginBottom:4}}>
            Присоединиться к игре
          </div>
          <div style={{display:'flex',justifyContent:'flex-end',gap:6,alignItems:'center'}}>
            <span style={{background:'white',color: highlighted ? '#15803d' : '#2563eb',
              borderRadius:4,padding:'1px 7px',fontSize:12,fontWeight:700}}>
              КПК
            </span>
            <span style={{fontSize:13,opacity:0.9}}>Архиран</span>
          </div>
        </div>
        <div>
          <div style={{fontSize:14,fontWeight:600,opacity:0.9}}>12 / 30</div>
          <div style={{fontSize:14,fontWeight:600,opacity:0.9}}>{secs}с</div>
        </div>
      </div>
    </button>
  );
};

  return (
    <div style={{
      margin:'10px 12px 0', borderRadius:12, padding:'10px 12px',
      background:'rgba(0,0,0,0.45)', backdropFilter:'blur(8px)',
      border:'1px solid rgba(255,255,255,0.1)', flexShrink:0,
    }}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        {/* Avatar/flag placeholder */}
        <div style={{width:38,height:38,borderRadius:8,background:'linear-gradient(135deg,#1e40af,#7c3aed)',
          display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:18}}>
          🏳️
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:2}}>
            <ShieldIcon size={13}/>
            <span style={{color:'rgba(255,255,255,0.6)',fontSize:11,fontWeight:600,letterSpacing:'0.05em',textTransform:'uppercase'}}>{tier}</span>

        <div style={{textAlign:'right',flexShrink:0}}>

        <div style={{width:`${pct}%`,height:'100%',background:'linear-gradient(90deg,#2563eb,#60a5fa)',borderRadius:3,transition:'width 0.4s ease'}}/>
      </div>
    </div>
  );
};

                  <div style={{flex:1}}/>

            ) : (
              /* Multiplayer left: join card summary */
              <button onClick={() => setLobbyHighlighted(h=>!h)} style={{

                position:'relative',background:lobbyHighlighted?'linear-gradient(135deg,#16a34a,#15803d)':'linear-gradient(135deg,#2563eb,#1d4ed8)',
                display:'flex',flexDirection:'column',transition:'all 0.3s',
              }}>
                <img src="assets/images/RandomMap.webp" alt="map" style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',opacity:0.3,maskImage:'linear-gradient(to right,#000 20%,transparent 100%)',WebkitMaskImage:'linear-gradient(to right,#000 20%,transparent 100%)'}}/>
                <div style={{position:'relative',zIndex:1,display:'flex',flexDirection:'column',justifyContent:'space-between',height:'100%',padding:'10px 12px',color:'white',textAlign:'right'}}>
                  <div>
                    <div style={{fontSize:14,fontWeight:700,marginBottom:3}}>Присоединиться к игре</div>
                    <div style={{display:'flex',justifyContent:'flex-end',gap:5,alignItems:'center'}}>
                      <span style={{background:'white',color:lobbyHighlighted?'#15803d':'#2563eb',borderRadius:3,padding:'1px 5px',fontSize:10,fontWeight:700}}>КПК</span>
                      <span style={{fontSize:11,opacity:0.9}}>Архиран</span>
                    </div>
                  </div>
                  <div>
                    <div style={{fontSize:12,fontWeight:600,opacity:0.9}}>12 / 30</div>
                    <div style={{fontSize:12,fontWeight:600,opacity:0.9}}>22с</div>
                  </div>
                </div>
              </button>
            )}
          </div>

          {/* DIVIDER */}
          <div style={{width:1,background:'rgba(255,255,255,0.06)',flexShrink:0,margin:'8px 0'}}/>

          {/* RIGHT: Instructions + spacer */}
          <div style={{flex:1,display:'flex',flexDirection:'column',padding:'8px 10px 8px 8px',gap:8}}>
            {tab === 'Мультиплеер' && (
              <div style={{color:'rgba(255,255,255,0.3)',fontSize:10,textAlign:'center',paddingTop:8}}>
                Нажмите на карточку, чтобы присоединиться
              </div>
            )}
            <div style={{flex:1}}/>
            <button style={{
              width:'100%',padding:'11px 12px',borderRadius:10,
              border:'1px solid rgba(255,255,255,0.12)',cursor:'pointer',
              background:'rgba(0,0,0,0.4)',backdropFilter:'blur(8px)',
              color:'white',fontFamily:'Overpass,system-ui,sans-serif',fontWeight:700,
              fontSize:13,display:'flex',alignItems:'center',gap:8,transition:'opacity 0.15s',flexShrink:0,
            }}
              onMouseEnter={e=>e.currentTarget.style.opacity='0.75'}
              onMouseLeave={e=>e.currentTarget.style.opacity='1'}
            >
              <span style={{fontSize:18}}>📖</span>
              <div style={{textAlign:'left'}}>
                <div>Инструкции</div>
                <div style={{fontSize:9,opacity:0.5,fontWeight:400,marginTop:1}}>Как играть?</div>
              </div>
              <div style={{flex:1}}/>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="white" strokeWidth="2" strokeLinecap="round" strokeOpacity="0.5"/></svg>
            </button>
          </div>
        </div>

        {/* Bottom bar */}
        <div style={{height:46,background:'rgba(17,24,39,0.96)',borderTop:'1px solid rgba(255,255,255,0.06)',display:'flex',alignItems:'center',padding:'0 4px 0 6px',flexShrink:0}}>
          <button style={{width:34,height:34,borderRadius:'50%',border:'none',cursor:'pointer',background:'#2563eb',display:'flex',alignItems:'center',justifyContent:'center',position:'relative',flexShrink:0,marginLeft:3}}>
            <BellIcon size={17} badge={true}/>
          </button>
          <div style={{flex:1,textAlign:'center',color:'rgba(255,255,255,0.3)',fontSize:9,lineHeight:1.4}}>Основано на OpenFront 0.0.127</div>
          <button style={{width:34,height:34,borderRadius:'50%',border:'none',cursor:'pointer',background:'#2563eb',display:'flex',alignItems:'center',justifyContent:'center',marginLeft:3}}>
            <ChatIcon size={17}/>
          </button>
          <button style={{width:34,height:34,borderRadius:'50%',border:'none',cursor:'pointer',background:'#2563eb',display:'flex',alignItems:'center',justifyContent:'center',marginLeft:3}}>
            <SettingsIcon size={17}/>
          </button>
        </div>
      </div>
    </div>
  );
};

// ---- PHONE FRAME ----
const PhoneScreen = ({initialTab='Мультиплеер', tweaks}) => {
  const [tab, setTab] = useState(initialTab);
  const [lobbyHighlighted, setLobbyHighlighted] = useState(tweaks.lobbyHighlighted);

  return (
    <div style={{
      width:390, height:550, display:'flex', flexDirection:'column',
      overflow:'hidden', borderRadius:16, boxShadow:'0 20px 60px rgba(0,0,0,0.7)',
      position:'relative', border:'1px solid rgba(255,255,255,0.08)',
    }}>
      {/* Map background */}
      <img src="assets/images/RandomMap.webp" alt=""
        style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',
          filter:'blur(3px) brightness(0.45) saturate(1.2)',transform:'scale(1.05)'}} />
      <div style={{position:'absolute',inset:0,background:'rgba(10,20,40,0.55)'}}/>

      {/* Layered UI */}
      <div style={{position:'relative',zIndex:1,display:'flex',flexDirection:'column',height:'100%'}}>
        <YandexTopBar/>

        {/* Citizenship — always visible */}
        {tweaks.citizenshipState === 'loggedIn'
          ? <CitizenshipLoggedIn name={tweaks.playerName} tier={tweaks.citizenTier} xpCurrent={tweaks.xpCurrent} xpMax={tweaks.xpMax}/>
          : <CitizenshipGuest/>
        }

        <TabSwitcher active={tab} onChange={setTab}/>

        {tab === 'Мультиплеер' ? (
          <>
            <JoinGameCard highlighted={lobbyHighlighted} onClick={() => setLobbyHighlighted(h => !h)}/>
            <div style={{flex:1}}/>
          </>
        ) : (
          <div style={{flex:1,display:'flex',flexDirection:'column',padding:'10px 12px',gap:10,overflowY:'auto'}}>
            <button style={{
              width:'100%',padding:'16px',borderRadius:12,border:'none',cursor:'pointer',
              background:'linear-gradient(135deg,#2563eb,#1d4ed8)',
              color:'white',fontFamily:'Overpass,system-ui,sans-serif',fontWeight:700,
              fontSize:16,display:'flex',alignItems:'center',gap:10,
              boxShadow:'0 4px 16px rgba(37,99,235,0.35)',transition:'opacity 0.15s',
            }}
              onMouseEnter={e=>e.currentTarget.style.opacity='0.85'}
              onMouseLeave={e=>e.currentTarget.style.opacity='1'}
            >
              <span style={{fontSize:22}}>🗺️</span>
              <div style={{textAlign:'left'}}>
                <div style={{fontSize:15,fontWeight:700}}>Своя Игра</div>
                <div style={{fontSize:11,opacity:0.7,fontWeight:400,marginTop:2}}>Настройте свою игру</div>
              </div>
              <div style={{flex:1}}/>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="white" strokeWidth="2" strokeLinecap="round" strokeOpacity="0.7"/></svg>
            </button>
            <button style={{
              width:'100%',padding:'16px',borderRadius:12,border:'none',cursor:'pointer',
              background:'linear-gradient(135deg,#2563eb,#1d4ed8)',
              color:'white',fontFamily:'Overpass,system-ui,sans-serif',fontWeight:700,
              fontSize:16,display:'flex',alignItems:'center',gap:10,
              boxShadow:'0 4px 16px rgba(37,99,235,0.35)',transition:'opacity 0.15s',
            }}
              onMouseEnter={e=>e.currentTarget.style.opacity='0.85'}
              onMouseLeave={e=>e.currentTarget.style.opacity='1'}
            >
              <span style={{fontSize:22}}>🎯</span>
              <div style={{textAlign:'left'}}>
                <div style={{fontSize:15,fontWeight:700}}>Играть миссию: {tweaks.missionNumber}</div>
                <div style={{fontSize:11,opacity:0.7,fontWeight:400,marginTop:2}}>Одиночная кампания</div>
              </div>
              <div style={{flex:1}}/>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="white" strokeWidth="2" strokeLinecap="round"/></svg>
            </button>
          </div>
        )}

        {/* Instructions — always visible */}
        <button style={{
          margin:'0 12px 10px',padding:'13px 16px',borderRadius:12,
          border:'1px solid rgba(255,255,255,0.12)',cursor:'pointer',
          background:'rgba(0,0,0,0.4)',backdropFilter:'blur(8px)',
          color:'white',fontFamily:'Overpass,system-ui,sans-serif',fontWeight:700,
          fontSize:15,display:'flex',alignItems:'center',gap:10,transition:'opacity 0.15s',
          flexShrink:0,
        }}
          onMouseEnter={e=>e.currentTarget.style.opacity='0.75'}
          onMouseLeave={e=>e.currentTarget.style.opacity='1'}
        >
          <span style={{fontSize:20}}>📖</span>
          <div style={{textAlign:'left'}}>
            <div style={{fontSize:14,fontWeight:700}}>Инструкции</div>
            <div style={{fontSize:11,opacity:0.55,fontWeight:400,marginTop:1}}>Как играть?</div>
          </div>
          <div style={{flex:1}}/>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="white" strokeWidth="2" strokeLinecap="round" strokeOpacity="0.5"/></svg>
        </button>

        <BottomBar/>
      </div>
    </div>
  );
};

// ---- TWEAKS PANEL ----
const TweaksPanel = ({tweaks, setTweaks, visible}) => {
  if (!visible) return null;
  const row = (label, children) => (
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
      <span style={{fontSize:12,color:'rgba(255,255,255,0.6)'}}>{label}</span>
      {children}
    </div>
  );
  const sel = (key, opts) => (
    <select value={tweaks[key]} onChange={e => setTweaks(t => ({...t,[key]:e.target.value}))}
      style={{background:'#1e293b',color:'white',border:'1px solid rgba(255,255,255,0.15)',borderRadius:5,padding:'3px 6px',fontSize:12,fontFamily:'inherit'}}>
      {opts.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
    </select>
  );
  const numInput = (key, min, max) => (
    <input type="number" value={tweaks[key]} min={min} max={max}
      onChange={e => setTweaks(t => ({...t,[key]:Number(e.target.value)}))}
      style={{width:70,background:'#1e293b',color:'white',border:'1px solid rgba(255,255,255,0.15)',borderRadius:5,padding:'3px 6px',fontSize:12,textAlign:'right'}}/>
  );
  const textInput = (key) => (
    <input type="text" value={tweaks[key]}
      onChange={e => setTweaks(t => ({...t,[key]:e.target.value}))}
      style={{width:110,background:'#1e293b',color:'white',border:'1px solid rgba(255,255,255,0.15)',borderRadius:5,padding:'3px 6px',fontSize:12}}/>
  );
  return (
    <div style={{
      position:'fixed',bottom:24,right:24,zIndex:1000,
      background:'rgba(15,23,42,0.97)',backdropFilter:'blur(16px)',
      border:'1px solid rgba(255,255,255,0.12)',borderRadius:14,
      padding:'14px 16px',width:270,boxShadow:'0 8px 32px rgba(0,0,0,0.5)',
    }}>
      <div style={{color:'white',fontWeight:700,fontSize:13,marginBottom:10,letterSpacing:'0.05em'}}>Tweaks</div>
      {row('Citizenship state', sel('citizenshipState', [{v:'loggedIn',l:'Logged in'},{v:'guest',l:'Guest'}]))}
      {row('Player name', textInput('playerName'))}
      {row('Citizen tier', textInput('citizenTier'))}
      {row('XP current', numInput('xpCurrent',0,9999))}
      {row('XP max', numInput('xpMax',100,9999))}
      {row('Mission #', numInput('missionNumber',1,20))}
    </div>
  );
};

// ---- ROOT ----
function App() {
  const [tweaks, setTweaks] = useState(TWEAKS_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);

  useEffect(() => {
    window.addEventListener('message', (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    });
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
  }, []);

  useEffect(() => {
    window.parent.postMessage({type:'__edit_mode_set_keys', edits: tweaks}, '*');
  }, [tweaks]);

  return (
    <>
      <DesignCanvas>
        <DCSection id="s1" title="Current Design">
          <DCArtboard id="mp" label="Multiplayer Tab" width={390} height={550}>
            <PhoneScreen initialTab="Мультиплеер" tweaks={tweaks}/>
          </DCArtboard>
          <DCArtboard id="sp" label="Singleplayer Tab" width={390} height={550}>
            <PhoneScreen initialTab="Одиночная" tweaks={tweaks}/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<div id="root"></div>
</body>
</html>
